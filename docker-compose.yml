services:
  mongodb:
    image: mongo:7
    container_name: ehr_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: ehrdb
    volumes:
      - mongo_data:/data/db
    networks:
      - ehr_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ehr_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: mongodb://mongodb:27017/ehrdb
      JWT_SECRET: ehr-super-secret-jwt-key-2024
      JWT_EXPIRE_HOURS: 8
      DEMO_ENCRYPTION_PASSWORD: EHR-DEMO-KEY-2024
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ehr_network
    volumes:
      - ./backend:/app   # live-reload: Uvicorn --reload picks up .py changes
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ehr_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - ehr_network
    volumes:
      - ./frontend/src:/app/src   # live-reload: Vite HMR picks up changes

  # One-shot seed service — runs python seed.py and exits.
  # Use: docker compose run --rm seed
  # Or:  docker compose up seed   (runs once then stops)
  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ehr_seed
    restart: "no"
    environment:
      MONGODB_URL: mongodb://mongodb:27017/ehrdb
      JWT_SECRET: ehr-super-secret-jwt-key-2024
      DEMO_ENCRYPTION_PASSWORD: EHR-DEMO-KEY-2024
    depends_on:
      mongodb:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - ehr_network
    volumes:
      - ./backend:/app
    command: ["python", "seed.py"]

volumes:
  mongo_data:
    driver: local

networks:
  ehr_network:
    driver: bridge
